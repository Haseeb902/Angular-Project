<section class="py-5">
  <div class="container">
    <h2 #revealItem class="text-center con-hd1 reveal">Why Choose Hi Clothes?</h2>

    <div class="row justify-content-space-around text-center g-4 card-cont">
      @for (item of card; track $index) {
        <div #revealItem class="col-12 col-sm-6 col-md-5 col-lg-3 reveal">
          <div class="feature-card">
            <div class="feature-icon eco-icon">
              <i [className]="item.icon"></i>
            </div>
            <h5 class="feature-title">{{ item.title }}</h5>
            <p class="feature-description">
              {{ item.description }}
            </p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
