<div class="signup-container">
  <!-- Left Side -->
  <div class="left-box">
    <h2>Welcome to signup form</h2>
    <p>
      Far far away, behind the word mountains, far from the countries Vokalia and Consonantia, there
      live the blind texts.
    </p>
  </div>

  <div class="right-box">
    <h4 class="mb-4 text-center">Sign in</h4>
    <form [formGroup]="myForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <input
          type="text"
          class="form-control"
          placeholder="Username"
          formControlName="username"
          [ngStyle]="{
            border:
              myForm.get('username')?.invalid && myForm.get('username')?.touched
                ? '1px solid red'
                : '',
          }"
        />

        <!-- @if (myForm.get('username')?.invalid && myForm.get('username')?.touched) {
          <span style="color: red">Required Username</span>
        } -->

        <div class="text-danger small mt-1">
          {{ getErrorMessage('username') }}
        </div>
      </div>

      <div class="mb-3">
        <input
          type="password"
          class="form-control"
          placeholder="Password"
          formControlName="password"
          [ngStyle]="{
            border:
              myForm.get('password')?.invalid && myForm.get('password')?.touched
                ? '1px solid red'
                : '',
          }"
        />

        <!-- @if (myForm.get('password')?.invalid && myForm.get('password')?.touched) {
          <span style="color: red">Required Password</span>
        } -->

        <div class="text-danger small mt-1">
          {{ getErrorMessage('password') }}
        </div>
      </div>

      <button type="submit" class="btn btn-dark">Sign in</button>

      <p class="text-center my-3">or</p>

      <div class="social-icons">
        <i class="bi bi-google"></i>
        <i class="bi bi-facebook"></i>
        <i class="bi bi-twitter"></i>
      </div>

      <p class="text-center mt-3">I'm already a member? <a routerLink="/sign-in">Sign In</a></p>
    </form>
  </div>
</div>
<router-outlet></router-outlet>
